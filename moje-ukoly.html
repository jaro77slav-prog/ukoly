<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje úkoly</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208;
    --paper: #221a0d;
    --ink: #f5e8d0;
    --ink-light: #c8aa80;
    --ink-faint: #7a6040;
    --accent: #f97316;
    --accent-soft: rgba(249,115,22,0.12);
    --done: #65a876;
    --done-soft: rgba(101,168,118,0.10);
    --shadow: rgba(0,0,0,0.35);
    --border: #332510;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Lora', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(249,115,22,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(249,115,22,0.04) 0%, transparent 60%);
  }

  /* Thin ruled lines like a notebook */
  .page-lines {
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 31px,
      var(--border) 31px,
      var(--border) 32px
    );
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .panel-left {
    padding: 48px 32px 60px;
    border-right: 1px solid var(--border);
    background: rgba(20,14,6,0.75);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 2;
  }

  .panel-right {
    padding: 48px 36px 80px;
    overflow-y: auto;
    min-height: 100vh;
    background: rgba(26,18,8,0.25);
  }

  /* HEADER */
  header {
    margin-bottom: 36px;
  }

  .date-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 12px;
  }

  h1 {
    font-size: 42px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .subtitle {
    font-size: 15px;
    color: var(--ink-light);
    margin-top: 10px;
    font-style: italic;
  }

  /* STATS */
  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
  }

  .stat-val.accent { color: var(--accent); }
  .stat-val.done-c { color: var(--done); }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ADD TASK */
  .add-section {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px 24px;
    margin-bottom: 32px;
    box-shadow: 0 2px 12px var(--shadow);
    position: relative;
  }

  .add-section::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 2px 0 0 2px;
  }

  .add-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .add-input {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 1.5px solid var(--border);
    padding: 8px 0;
    font-size: 16px;
    font-family: 'Lora', serif;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .add-input:focus { border-bottom-color: var(--accent); }
  .add-input::placeholder { color: var(--ink-faint); font-style: italic; }

  .add-meta {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  select, .date-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-light);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus, .date-input:focus { border-color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 20px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-add:hover { background: #ea6a0a; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .filter-btn {
    background: none;
    border: none;
    padding: 8px 16px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }

  .filter-btn:hover { color: var(--ink); }
  .filter-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 12px 10px 36px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--ink-faint); }

  /* TASK LIST */
  .section-heading {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  #task-list { display: flex; flex-direction: column; gap: 8px; }

  .task {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    animation: taskIn 0.3s ease;
  }

  @keyframes taskIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task:hover { box-shadow: 0 2px 16px var(--shadow); }

  .task.done-task {
    background: var(--done-soft);
    border-color: rgba(122,158,126,0.2);
    opacity: 0.7;
  }

  .task.overdue { border-left: 3px solid var(--accent); }
  .task.high-prio:not(.done-task) { border-left: 3px solid var(--accent); }
  .task.med-prio:not(.done-task) { border-left: 3px solid #e67e22; }
  .task.low-prio:not(.done-task) { border-left: 3px solid var(--ink-faint); }

  /* Checkbox */
  .task-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--ink-faint);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.2s;
    background: none;
  }

  .task-check:hover { border-color: var(--done); background: var(--done-soft); }
  .task-check.checked { border-color: var(--done); background: var(--done); }
  .task-check.checked::after { content: '✓'; color: white; font-size: 11px; }

  /* Task body */
  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    transition: all 0.2s;
  }

  .task-created {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 400;
    font-style: normal;
    opacity: 0.7;
  }

  .task.done-task .task-text {
    text-decoration: line-through;
    color: var(--ink-light);
  }

  .task-note {
    font-size: 13px;
    color: var(--ink-light);
    font-style: italic;
    margin-top: 4px;
    line-height: 1.5;
  }

  .task-chips {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 1px;
  }

  .chip-cat {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(249,115,22,0.2);
  }

  .chip-prio.high { background: rgba(249,115,22,0.12); color: var(--accent); }
  .chip-prio.medium { background: rgba(230,126,34,0.08); color: #e67e22; }
  .chip-prio.low { background: var(--bg); color: var(--ink-faint); border: 1px solid var(--border); }

  .chip-date { color: var(--ink-faint); }
  .chip-date.overdue { color: var(--accent); }

  /* Task actions */
  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .task:hover .task-actions { opacity: 1; }

  .action-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }

  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.del:hover { border-color: var(--accent); background: var(--accent-soft); }

  /* Edit inline */
  .task-edit-input {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1.5px solid var(--accent);
    font-family: 'Lora', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    padding: 2px 0;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
  }

  .empty-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.4; }
  .empty p { font-style: italic; font-size: 15px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 10px 20px;
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scroll to top */
  .scroll-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 40px; height: 40px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: all 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .scroll-top.visible { opacity: 1; }
  .scroll-top:hover { background: var(--accent); color: white; border-color: var(--accent); }

  /* Category tags */
  .cat-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .cat-filter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--paper);
    border-radius: 1px;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.15s;
  }

  .cat-filter:hover, .cat-filter.active {
    background: var(--accent-soft);
    border-color: rgba(249,115,22,0.35);
    color: var(--accent);
  }


  #sync-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-top: 8px;
    letter-spacing: 1px;
    opacity: 0.85;
  }

  /* Better text visibility */
  h1 {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.5);
  }

  .date-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8aa80;
    margin-bottom: 12px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  .subtitle {
    font-size: 15px;
    color: #c8aa80;
    margin-top: 10px;
    font-style: italic;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #f8edd8;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #a08860;
    font-family: 'JetBrains Mono', monospace;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  .task-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    word-break: break-word;
    transition: all 0.2s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  .task-note {
    font-size: 13px;
    color: #c8aa80;
    font-style: italic;
    margin-top: 4px;
    line-height: 1.5;
    font-weight: 500;
  }

  .add-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid #4a3520;
    border-radius: 2px;
    padding: 20px 24px;
    margin-bottom: 0;
    box-shadow: none;
    position: relative;
  }

  .task {
    background: rgba(34,26,13,0.90);
    border: 1px solid #3a2810;
    border-radius: 2px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    animation: taskIn 0.3s ease;
    backdrop-filter: blur(2px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .filter-btn {
    background: none;
    border: none;
    padding: 8px 16px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #b09070;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  .filter-btn:hover { color: #f5e8d0; }
  .filter-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .section-heading {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8a7050;
    margin-bottom: 12px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .panel-left { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .panel-right { min-height: auto; }
  }
  @media (max-width: 500px) {
    .panel-left, .panel-right { padding: 32px 16px; }
    h1 { font-size: 30px; }
    .add-row { flex-direction: column; align-items: stretch; }
    .btn-add { text-align: center; }
    .stats-row { gap: 20px; }
  }

  .photo-bg {
    position: fixed;
    top: 0; right: 0;
    width: 45%;

<body>
<div class="photo-bg"></div>
<div class="page-lines"></div>
<div class="toast" id="toast"></div>

<div class="app">
  <!-- LEFT PANEL: header + add form -->
  <div class="panel-left">
    <header>
      <div class="date-line" id="header-date"></div>
      <h1>Moje <em>úkoly</em></h1>
      <p class="subtitle">Soukromý zápisník — co nesmím zapomenout</p>
      <p id="sync-status" style="font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:8px;letter-spacing:1px;">⚠️ Firebase není nastaven</p>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-val" id="stat-total">0</span>
          <span class="stat-label">Celkem</span>
        </div>
        <div class="stat">
          <span class="stat-val accent" id="stat-open">0</span>
          <span class="stat-label">Otevřeno</span>
        </div>
        <div class="stat">
          <span class="stat-val done-c" id="stat-done">0</span>
          <span class="stat-label">Hotovo</span>
        </div>
        <div class="stat">
          <span class="stat-val accent" id="stat-overdue">0</span>
          <span class="stat-label">Po termínu</span>
        </div>
      </div>
    </header>

    <!-- ADD TASK -->
    <div class="add-section">
      <div class="add-row">
        <input type="text" class="add-input" id="new-task" placeholder="Co potřebuji udělat…" maxlength="200" autocomplete="off">
        <button class="btn-add" id="btn-add">+ Přidat</button>
      </div>
      <div class="add-meta">
        <input type="text" class="date-input" id="new-note" placeholder="Poznámka (volitelné)" style="flex:1;min-width:120px">
        <select id="new-cat">
          <option value="">Bez kategorie</option>
          <option value="Práce">Práce</option>
          <option value="Osobní">Osobní</option>
          <option value="Nákup">Nákup</option>
          <option value="Zdraví">Zdraví</option>
          <option value="Finance">Finance</option>
          <option value="Rodina">Rodina</option>
        </select>
        <select id="new-prio">
          <option value="medium">Střední priorita</option>
          <option value="high">Vysoká priorita</option>
          <option value="low">Nízká priorita</option>
        </select>
        <input type="date" class="date-input" id="new-deadline" title="Termín splnění">
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: filters + task list -->
  <div class="panel-right">
    <!-- FILTER & SEARCH -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Vše</button>
      <button class="filter-btn" data-filter="open">Otevřené</button>
      <button class="filter-btn" data-filter="done">Hotové</button>
      <button class="filter-btn" data-filter="overdue">Po termínu</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="search" placeholder="Hledat úkoly…">
    </div>

    <div class="cat-row" id="cat-row"></div>

    <div class="section-heading" id="list-heading">Úkoly</div>
    <div id="task-list"></div>

    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">✎</div>
      <p>Žádné úkoly k zobrazení.<br>Přidejte první úkol výše.</p>
    </div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" title="Nahoru">↑</button>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════
//  🔧 FIREBASE KONFIGURACE — vyplňte svými hodnotami z Firebase
// ═══════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyCWCdFn0cCXpd567mwSepMyekbzcaRsoAU",
  authDomain:        "moje-ukoly.firebaseapp.com",
  projectId:         "moje-ukoly",
  storageBucket:     "moje-ukoly.firebasestorage.app",
  messagingSenderId: "756326467955",
  appId:             "1:756326467955:web:8b0ae5c6f4954abb085d06"
};
// ═══════════════════════════════════════════════════════════════

// Detect if config is filled in
const CONFIG_READY = !Object.values(firebaseConfig).some(v => v.startsWith("VLOŽTE"));

let db, tasksCol;
if (CONFIG_READY) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  tasksCol = db.collection("ukoly");
}

// ── DATA ──────────────────────────────────────────────────────────
let tasks = [];
let currentFilter = 'all';
let currentCat = '';
let searchQuery = '';

// Show connection status
function setStatus(ok, msg) {
  let el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = ok ? '#65a876' : '#f97316';
}

// Save a single task to Firestore (or localStorage fallback)
function saveTask(task) {
  if (!CONFIG_READY) {
    localStorage.setItem('moje-ukoly', JSON.stringify(tasks));
    return;
  }
  return tasksCol.doc(task.id).set(task);
}

function deleteTaskFromDB(id) {
  if (!CONFIG_READY) {
    localStorage.setItem('moje-ukoly', JSON.stringify(tasks));
    return;
  }
  return tasksCol.doc(id).delete();
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ── DATE HELPERS ──────────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('cs-CZ', {day:'numeric', month:'short'});
}

function formatCreated(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('cs-CZ', {day:'numeric', month:'short', year:'numeric'});
}

function isOverdue(t) {
  if (!t.deadline || t.done) return false;
  return t.deadline < todayStr();
}

// ── RENDER ────────────────────────────────────────────────────────
function getFiltered() {
  return tasks.filter(t => {
    if (currentCat && t.category !== currentCat) return false;
    if (currentFilter === 'open' && t.done) return false;
    if (currentFilter === 'done' && !t.done) return false;
    if (currentFilter === 'overdue' && !isOverdue(t)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!t.text.toLowerCase().includes(q) && !(t.note||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty');
  const heading = document.getElementById('list-heading');
  const filtered = getFiltered();

  document.getElementById('stat-total').textContent = tasks.length;
  document.getElementById('stat-open').textContent = tasks.filter(t => !t.done).length;
  document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;
  document.getElementById('stat-overdue').textContent = tasks.filter(isOverdue).length;

  const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
  const catRow = document.getElementById('cat-row');
  catRow.innerHTML = '';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-filter' + (currentCat === c ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { currentCat = currentCat === c ? '' : c; render(); };
    catRow.appendChild(btn);
  });

  heading.textContent = filtered.length + ' úkolů' + (currentCat ? ` · ${currentCat}` : '') + (searchQuery ? ` · "${searchQuery}"` : '');

  if (!filtered.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const prioOrder = { high: 0, medium: 1, low: 2 };
  filtered.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (isOverdue(a) !== isOverdue(b)) return isOverdue(a) ? -1 : 1;
    if (a.priority !== b.priority) return (prioOrder[a.priority]||1) - (prioOrder[b.priority]||1);
    if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
    if (a.deadline) return -1;
    if (b.deadline) return 1;
    return b.createdAt - a.createdAt;
  });

  list.innerHTML = '';
  filtered.forEach(t => list.appendChild(makeTaskEl(t)));
}

function makeTaskEl(t) {
  const overdue = isOverdue(t);
  const el = document.createElement('div');
  el.className = ['task',
    t.done ? 'done-task' : '',
    overdue ? 'overdue' : '',
    !t.done ? t.priority + '-prio' : ''
  ].filter(Boolean).join(' ');
  el.dataset.id = t.id;

  const prioLabel = { high: 'Vysoká', medium: 'Střední', low: 'Nízká' };

  el.innerHTML = `
    <button class="task-check ${t.done ? 'checked' : ''}" title="${t.done ? 'Označit jako otevřené' : 'Označit jako hotové'}"></button>
    <div class="task-body">
      <div class="task-text">${escHtml(t.text)} <span class="task-created">— ${formatCreated(t.createdAt)}</span></div>
      ${t.note ? `<div class="task-note">${escHtml(t.note)}</div>` : ''}
      <div class="task-chips">
        ${t.category ? `<span class="chip chip-cat">${escHtml(t.category)}</span>` : ''}
        <span class="chip chip-prio ${t.priority}">${prioLabel[t.priority]||''}</span>
        ${t.deadline ? `<span class="chip chip-date ${overdue ? 'overdue' : ''}">📅 ${formatDate(t.deadline)}${overdue ? ' — po termínu!' : ''}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="action-btn edit" title="Upravit">✎</button>
      <button class="action-btn del" title="Smazat">✕</button>
    </div>
  `;

  el.querySelector('.task-check').addEventListener('click', () => {
    t.done = !t.done;
    if (t.done) t.doneAt = Date.now(); else delete t.doneAt;
    saveTask(t);
    toast(t.done ? '✓ Úkol splněn!' : 'Úkol znovu otevřen');
  });

  el.querySelector('.del').addEventListener('click', () => {
    if (!confirm('Smazat úkol "' + t.text + '"?')) return;
    deleteTaskFromDB(t.id);
    toast('Úkol smazán');
  });

  el.querySelector('.edit').addEventListener('click', () => {
    const textEl = el.querySelector('.task-text');
    const orig = t.text;
    textEl.innerHTML = `<input class="task-edit-input" value="${escHtml(t.text)}" maxlength="200">`;
    const inp = textEl.querySelector('input');
    inp.focus(); inp.select();
    inp.addEventListener('blur', () => {
      const v = inp.value.trim();
      if (v && v !== orig) { t.text = v; saveTask(t); toast('Úkol upraven'); }
      render();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = orig; inp.blur(); }
    });
  });

  return el;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ADD TASK ──────────────────────────────────────────────────────
function addTask() {
  const text = document.getElementById('new-task').value.trim();
  if (!text) { document.getElementById('new-task').focus(); return; }
  const task = {
    id: genId(),
    text,
    note: document.getElementById('new-note').value.trim(),
    category: document.getElementById('new-cat').value,
    priority: document.getElementById('new-prio').value,
    deadline: document.getElementById('new-deadline').value,
    done: false,
    createdAt: Date.now()
  };
  saveTask(task);
  document.getElementById('new-task').value = '';
  document.getElementById('new-note').value = '';
  document.getElementById('new-deadline').value = '';
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
  toast('✎ Úkol přidán');
}

// ── EVENTS ────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', addTask);
document.getElementById('new-task').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

const scrollBtn = document.getElementById('scroll-top');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 200);
});
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────────
const days = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const now2 = new Date();
document.getElementById('header-date').textContent =
  `${days[now2.getDay()]} ${now2.getDate()}. ${months[now2.getMonth()]} ${now2.getFullYear()}`;
document.getElementById('new-deadline').min = todayStr();

// ── FIREBASE REAL-TIME LISTENER or localStorage fallback ──────────
if (CONFIG_READY) {
  setStatus(true, '🔄 Připojuji...');
  tasksCol.orderBy('createdAt', 'desc').onSnapshot(snapshot => {
    tasks = snapshot.docs.map(d => d.data());
    setStatus(true, '🟢 Synchronizováno');
    render();
  }, err => {
    setStatus(false, '🔴 Chyba připojení');
    console.error(err);
  });
} else {
  // Fallback to localStorage when config not set
  tasks = JSON.parse(localStorage.getItem('moje-ukoly') || '[]');
  setStatus(false, '⚠️ Firebase není nastaven — data se nesynchornizují');
  render();
}
</script>
